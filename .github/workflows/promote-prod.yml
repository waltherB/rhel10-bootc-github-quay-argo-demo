name: promote-rhel10-bootc-prod

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Existing source tag to promote, for example dev or v1.0.0"
        required: true
        default: "dev"

permissions:
  contents: read
  id-token: write

env:
  IMAGE: ${{ vars.QUAY_IMAGE }}

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to Quay
        run: |
          echo "${{ secrets.QUAY_TOKEN }}" | \
            skopeo login quay.io \
              -u "${{ secrets.QUAY_USERNAME }}" \
              --password-stdin

      - name: Promote selected tag to prod
        run: |
          skopeo copy \
            docker://${IMAGE}:${{ github.event.inputs.source_tag }} \
            docker://${IMAGE}:prod

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign prod tag
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${IMAGE}:prod"
