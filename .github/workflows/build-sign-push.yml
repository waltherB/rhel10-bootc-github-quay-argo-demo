name: build-sign-push-rhel10-bootc

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ${{ vars.QUAY_IMAGE }}
  # Set TARGET_PLATFORM to 'auto' (detect runner arch) by default; override via repo variables if needed
  TARGET_PLATFORM: ${{ vars.TARGET_PLATFORM || 'auto' }}

jobs:
  build-sign-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y podman skopeo jq

      - name: Login to Red Hat Registry
        run: |
          echo "${{ secrets.RH_REGISTRY_PASSWORD }}" | \
            podman login registry.redhat.io \
              -u "${{ secrets.RH_REGISTRY_USERNAME }}" \
              --password-stdin

      - name: Login to Quay
        run: |
          echo "${{ secrets.QUAY_TOKEN }}" | \
            podman login quay.io \
              -u "${{ secrets.QUAY_USERNAME }}" \
              --password-stdin

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION_TAG="dev-${SHORT_SHA}"
          fi

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

          echo "Computed SHORT_SHA=${SHORT_SHA}"
          echo "Computed VERSION_TAG=${VERSION_TAG}"

      - name: Validate image reference
        shell: bash
        run: |
          set -euo pipefail

          CLEAN_IMAGE="$(echo "${IMAGE}" | tr -d '\r\n' | xargs)"
          CLEAN_PLATFORM="$(echo "${TARGET_PLATFORM}" | tr -d '\r\n' | xargs)"

          echo "IMAGE=${CLEAN_IMAGE}"
          echo "TARGET_PLATFORM=${CLEAN_PLATFORM}"
          echo "VERSION_TAG=${{ steps.meta.outputs.version_tag }}"
          echo "DEV_REF=${CLEAN_IMAGE}:dev"
          echo "VERSION_REF=${CLEAN_IMAGE}:${{ steps.meta.outputs.version_tag }}"

          if [[ -z "${CLEAN_IMAGE}" ]]; then
            echo "ERROR: IMAGE is empty. Check GitHub variable QUAY_IMAGE."
            exit 1
          fi

          if [[ "${CLEAN_IMAGE}" =~ [[:space:]] ]]; then
            echo "ERROR: IMAGE contains whitespace: '${CLEAN_IMAGE}'"
            exit 1
          fi

          if [[ "${CLEAN_IMAGE}" == *"@"* ]]; then
            echo "ERROR: IMAGE contains @. Use quay.io/waba/bootc-guide, not quay.io/waba@atea.dk/..."
            exit 1
          fi

      - name: Build RHEL bootc image
        shell: bash
        run: |
          set -euo pipefail

          CLEAN_IMAGE="$(echo "${IMAGE}" | tr -d '\r\n' | xargs)"
          CLEAN_PLATFORM="$(echo "${TARGET_PLATFORM}" | tr -d '\r\n' | xargs)"
          VERSION_TAG="${{ steps.meta.outputs.version_tag }}"

          # If TARGET_PLATFORM is explicitly set to 'auto' or empty, detect host arch
          if [[ -z "${CLEAN_PLATFORM}" || "${CLEAN_PLATFORM}" == "auto" ]]; then
            case "$(uname -m)" in
              x86_64) PLATFORM="linux/amd64" ;;
              aarch64) PLATFORM="linux/arm64" ;;
              armv7l|armv7) PLATFORM="linux/arm/v7" ;;
              *) PLATFORM="linux/amd64" ;;  # fallback
            esac
          else
            PLATFORM="${CLEAN_PLATFORM}"
          fi

          echo "Detected/selected platform: ${PLATFORM}"

          podman build \
            --platform "${PLATFORM}" \
            --build-arg RHSM_ACTIVATION_KEY="${{ secrets.RHSM_ACTIVATION_KEY }}" \
            --build-arg RHSM_ORG="${{ secrets.RHSM_ORG }}" \
            -t "${CLEAN_IMAGE}:${VERSION_TAG}" \
            -t "${CLEAN_IMAGE}:dev" \
            .

      - name: Smoke test image as container
        shell: bash
        run: |
          set -euo pipefail

          CLEAN_IMAGE="$(echo "${IMAGE}" | tr -d '\r\n' | xargs)"

          podman rm -f bootc-test 2>/dev/null || true
          podman run --rm -d -p 8080:80 --name bootc-test "${CLEAN_IMAGE}:dev"

          # Wait for the container to be ready
          sleep 5

          # Add retry logic for curl
          for i in {1..10}; do
            if curl -fsS http://127.0.0.1:8080 | head; then
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 1
          done

          podman exec bootc-test cat /etc/motd
          podman stop bootc-test

      - name: Push tags to Quay
        shell: bash
        run: |
          set -euo pipefail

          CLEAN_IMAGE="$(echo "${IMAGE}" | tr -d '\r\n' | xargs)"
          VERSION_TAG="${{ steps.meta.outputs.version_tag }}"

          podman push "${CLEAN_IMAGE}:${VERSION_TAG}"
          podman push "${CLEAN_IMAGE}:dev"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign pushed images with keyless Cosign
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail

          # Authenticate cosign to Quay.io
          cosign login quay.io \
            -u "${{ secrets.QUAY_USERNAME }}" \
            -p "${{ secrets.QUAY_TOKEN }}"

          CLEAN_IMAGE="$(echo "${IMAGE}" | tr -d '\r\n' | xargs)"
          VERSION_TAG="${{ steps.meta.outputs.version_tag }}"

          cosign sign "${CLEAN_IMAGE}:${VERSION_TAG}"
          cosign sign "${CLEAN_IMAGE}:dev"

      - name: Verify signatures
        shell: bash
        run: |
          set -euo pipefail

          CLEAN_IMAGE="$(echo "${IMAGE}" | tr -d '\r\n' | xargs)"

          cosign verify "${CLEAN_IMAGE}:dev" \
            --certificate-identity-regexp "https://github.com/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
